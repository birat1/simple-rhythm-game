services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploaded_tracks:/app/uploaded_tracks
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: ./backend
    command: uv run celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploaded_tracks:/app/uploaded_tracks
    depends_on:
      - backend
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0